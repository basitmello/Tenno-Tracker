/* Baro and Prime Resurgence rotation anchors, sourced live (see chat).
   Baro: appears every 14 days for a 48h window. Anchor: arrived 2026-06-26 (Orcus Relay).
   Varzia/Prime Resurgence: current rotation ends 2026-07-10 04:00 UTC (Jul 9 11PM ET), then rotates every 28 days. */
const BARO_CYCLE = 14 * 86400000;
const BARO_VISIT = 48 * 3600000;
const BARO_ANCHOR_ARRIVAL = Date.UTC(2026, 5, 26, 17, 0, 0);
const VARZIA_CYCLE = 28 * 86400000;
const VARZIA_ANCHOR_END = Date.UTC(2026, 6, 10, 3, 0, 0);

function baroStatus(now) {
  const sinceAnchor = now - BARO_ANCHOR_ARRIVAL;
  const cyclePos = ((sinceAnchor % BARO_CYCLE) + BARO_CYCLE) % BARO_CYCLE;
  if (cyclePos < BARO_VISIT) {
    return { active: true, msLeft: BARO_VISIT - cyclePos };
  }
  return { active: false, msLeft: BARO_CYCLE - cyclePos };
}
function varziaStatus(now) {
  const sinceEnd = now - VARZIA_ANCHOR_END;
  const cyclePos = ((sinceEnd % VARZIA_CYCLE) + VARZIA_CYCLE) % VARZIA_CYCLE;
  return { msLeft: VARZIA_CYCLE - cyclePos };
}

/* ============================================================
   TIME HELPERS
   ============================================================ */
function dailyBoundaryKey(d){ return d.toISOString().slice(0,10); }
function mondayOf(d){
  const day = d.getUTCDay();
  const diff = day === 0 ? -6 : 1 - day;
  return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()+diff)).toISOString().slice(0,10);
}
function nextDailyReset(now){ return new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()+1)); }
function nextWeeklyReset(now){
  const day = now.getUTCDay();
  const daysUntilMonday = (8 - day) % 7 || 7;
  return new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()+daysUntilMonday));
}
function fmtDur(ms){
  let s = Math.floor(ms/1000);
  const d = Math.floor(s/86400); s -= d*86400;
  const h = Math.floor(s/3600); s -= h*3600;
  const m = Math.floor(s/60); s -= m*60;
  const pad = n => String(n).padStart(2,"0");
  return d>0 ? (d+"d "+pad(h)+":"+pad(m)+":"+pad(s)) : (pad(h)+":"+pad(m)+":"+pad(s));
}
function cycleMs(now, cycle, epoch){
  const elapsed = now - epoch;
  const into = ((elapsed % cycle) + cycle) % cycle;
  return cycle - into;
}
function cyclePct(now, cycle, epoch){ return 100 - (cycleMs(now,cycle,epoch)/cycle)*100; }
function eleanorBatch(now){
  const elapsed = now - ELEANOR_EPOCH;
  const cycles = Math.floor(elapsed / (4*86400000));
  return cycles % 2 === 0 ? "A" : "B";
}
function baroStatus(now){
  const sinceAnchor = now - BARO_ANCHOR_ARRIVAL;
  const cyclePos = ((sinceAnchor % BARO_CYCLE) + BARO_CYCLE) % BARO_CYCLE;
  if(cyclePos < BARO_VISIT) return { active:true, msLeft: BARO_VISIT - cyclePos };
  return { active:false, msLeft: BARO_CYCLE - cyclePos };
}
function varziaStatus(now){
  const sinceEnd = now - VARZIA_ANCHOR_END;
  const cyclePos = ((sinceEnd % VARZIA_CYCLE) + VARZIA_CYCLE) % VARZIA_CYCLE;
  return { msLeft: VARZIA_CYCLE - cyclePos };
}

/* ============================================================
   GLOSSARY LINKING
   ============================================================ */
function linkTerms(str){
  if(!str) return "";
  let segments = [{type:"text", value:str}];
  for(const g of GLOSS_ORDER){
    const next = [];
    let matched = false;
    for(const seg of segments){
      if(matched || seg.type !== "text"){ next.push(seg); continue; }
      const m = seg.value.match(g.re);
      if(!m){ next.push(seg); continue; }
      matched = true;
      const before = seg.value.slice(0, m.index);
      const term = m[0];
      const after = seg.value.slice(m.index + term.length);
      if(before) next.push({type:"text", value:before});
      next.push({type:"term", value:term, key:g.key});
      if(after) next.push({type:"text", value:after});
    }
    segments = next;
  }
  return segments.map(seg=>{
    if(seg.type==="term"){
      return '<span class="gl" data-g="'+seg.key+'" style="color:'+C.green+';border-bottom:1px dotted '+C.green+';cursor:help;">'+seg.value+'</span>';
    }
    return seg.value;
  }).join("");
}

function loadJSON(key, fallback){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; }
}
function saveJSON(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
}

  if(weeklyState.resetKey !== wKey){ weeklyState = {resetKey:wKey, done:{}}; saveJSON("wf-weekly-state", weeklyState); }

}
function chipHTML(key, label, active, activeColor, activeText, handler){
  return '<div onclick="'+handler+"('"+key+"')"+'" style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;letter-spacing:0.06em;padding:7px 12px;border-radius:6px;cursor:pointer;user-select:none;text-transform:uppercase;'
    +'border:1px solid '+(active?activeColor:C.line)+';background:'+(active?activeColor:C.panel)+';color:'+(active?activeText:C.muted)+';">'+label+'</div>';
}
function lootRowHTML(r){
  if(!r || !r.length) return "";
  return '<div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;">'
    +'<span style="font-family:\'JetBrains Mono\',monospace;font-size:8.5px;letter-spacing:0.12em;color:#7a6d3a;text-transform:uppercase;margin-right:2px;">Loot</span>'
    +r.map(x=>'<span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:'+C.yellow+';border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);border-radius:4px;padding:2px 7px;white-space:nowrap;">'+x+'</span>').join("")
    +'</div>';
}
function infoRowsHTML(info, pathMode){
  if(!info) return "";
  const rows = [];
  if(info.w) rows.push(["What", C.green, info.w]);
  if(info.a) rows.push([pathMode?"Why":"Aim", C.yellow, info.a]);
  if(info.p) rows.push(["Prep", C.orange, info.p]);
  if(info.f) rows.push(["Fast", C.sky, info.f]);
  if(info.l) rows.push(["Where", C.purple, info.l]);
  if(!rows.length) return "";
  return '<div style="margin-top:10px;background:'+C.panel2+';border:1px solid '+C.line+';border-radius:6px;padding:0 12px;">'
    +rows.map(([label,color,text],i)=>'<div style="display:flex;gap:12px;padding:8px 0;font-size:12.5px;line-height:1.6;color:'+C.body+';'+(i<rows.length-1?('border-bottom:1px solid '+C.lineSoft+';'):"")+'">'
      +'<span style="flex-shrink:0;width:50px;font-family:\'JetBrains Mono\',monospace;font-size:9px;letter-spacing:0.1em;padding-top:3px;text-transform:uppercase;color:'+color+';">'+label+'</span>'
      +'<span>'+linkTerms(text)+'</span></div>').join("")
    +'</div>';
}
function cardOpen(done, optional){
  return '<div style="background:'+C.panel+';border:1px solid '+C.line+';border-style:'+(optional?"dashed":"solid")+';border-radius:8px;padding:14px 16px 12px;display:flex;gap:12px;align-items:flex-start;opacity:'+(done?0.5:1)+';">';
}
function checkboxHTML(checked, color, onclick){
  return '<div onclick="'+onclick+'" style="flex-shrink:0;width:20px;height:20px;margin-top:2px;border-radius:5px;cursor:pointer;position:relative;'
    +'border:2px solid '+(checked?color:C.muted)+';background:'+(checked?color:"transparent")+';">'
    +(checked?'<svg style="position:absolute;inset:0;margin:auto;" width="11" height="9" viewBox="0 0 11 9"><path d="M1 4.5L4 7.5L10 1" stroke="#14161a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':"")
    +'</div>';
}
function rankHTML(n, ember){
  const color = ember ? C.sky : C.yellow;
  return '<div style="flex-shrink:0;width:30px;height:30px;margin-top:2px;border-radius:6px;border:1px solid '+color+'55;background:'+color+'14;display:flex;align-items:center;justify-content:center;font-family:\'JetBrains Mono\',monospace;font-size:12.5px;color:'+color+';">'+String(n).padStart(2,"0")+'</div>';
}
function vendorBarHTML(label, pct, active){
  const color = active ? C.green : C.sky;
  return '<div style="display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;">'
    +'<div style="flex:1;min-width:110px;height:6px;background:#0a0b0d;border-radius:3px;overflow:hidden;">'
    +'<div style="height:100%;border-radius:3px;background:'+color+';width:'+Math.max(0,Math.min(100,pct))+'%;transition:width .3s ease;"></div></div>'
    +'<span style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:'+color+';white-space:nowrap;">'+label+'</span></div>';
}

/* ============================================================
   ROUTINE TAB
   ============================================================ */
function renderRoutineTab(){
  const chips = [["daily","Daily"],["weekly","Weekly"],["timers","Vendor Timers"]];
  let html = '<div style="display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 12px;position:sticky;top:0;z-index:10;background:linear-gradient(to bottom, '+C.bg+' 78%, transparent);">'
    +chips.map(([k,l])=>chipHTML(k,l,routineFilter===k,C.green,"#0e1a12","setRoutineFilter")).join("")
    +'</div>';

  if(routineFilter !== "timers"){
    const items = routineFilter==="daily" ? dailyItems : weeklyItems;
    const state = routineFilter==="daily" ? dailyState : weeklyState;
    const toggleFn = routineFilter==="daily" ? "toggleDaily" : "toggleWeekly";
    const checkColor = routineFilter==="daily" ? C.green : C.yellow;
    const visible = items.filter(i=>!i.opt || showOptional);
    const doneCount = visible.filter(i=>state.done[i.id]).length;
    const pct = visible.length ? (doneCount/visible.length*100) : 0;
    const resetMs = routineFilter==="daily" ? (nextDailyReset(new Date())-new Date()) : (nextWeeklyReset(new Date())-new Date());

    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap;">'
      +'<div style="flex:1;min-width:180px;">'+progressBarHTML(pct, checkColor)
      +'<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:'+C.muted+';margin-top:6px;">'
      +'<span>'+doneCount+' / '+visible.length+' complete</span>'
      +'<span style="margin-left:8px;color:'+checkColor+';">· resets in '+fmtDur(resetMs)+'</span></div></div>'
      +'<div onclick="toggleOptional()" style="display:flex;align-items:center;gap:8px;font-family:\'JetBrains Mono\',monospace;font-size:10.5px;color:'+C.muted+';cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;">'
      +'<div style="width:34px;height:18px;border-radius:9px;position:relative;border:1px solid '+(showOptional?C.green:C.line)+';background:'+(showOptional?"rgba(52,211,153,0.15)":C.panel)+';">'
      +'<div style="position:absolute;top:2px;width:12px;height:12px;border-radius:50%;transition:left .15s ease;left:'+(showOptional?"18px":"2px")+';background:'+(showOptional?C.green:C.muted)+';"></div></div>'
      +'<span>Optional extras</span></div></div>';

    html += '<div style="display:flex;flex-direction:column;gap:8px;">';
    visible.forEach(it=>{
      const done = !!state.done[it.id];
      const isExp = !!expanded[it.id];
      html += cardOpen(done, it.opt);
      html += checkboxHTML(done, checkColor, "event.stopPropagation();"+toggleFn+"('"+it.id+"')");
      html += '<div onclick="toggleExpand(\''+it.id+'\')" style="flex:1;cursor:pointer;min-width:0;">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
        +'<div style="font-weight:600;font-size:15px;letter-spacing:-0.01em;color:'+(done?C.muted:C.text)+';text-decoration:'+(done?"line-through":"none")+';">'+it.t+'</div>'
        +(it.opt?('<span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;letter-spacing:0.08em;color:'+C.optBorder+';border:1px solid '+C.optBorder+'88;border-radius:4px;padding:1px 6px;text-transform:uppercase;">Optional</span>'):"")
        +'<span style="margin-left:auto;color:'+C.muted+';font-size:11px;transition:transform .2s ease;transform:'+(isExp?"rotate(180deg)":"none")+';">▼</span></div>'
        +'<div style="font-size:13px;color:#a4aab6;margin-top:4px;line-height:1.5;">'+it.d+'</div>'
        +(isExp?infoRowsHTML(it.i):"")
        +(isExp?lootRowHTML(it.r):"")
        +'</div></div>';
    });
    html += '</div>';
  } else {
    const n = Date.now();
    const baro = baroStatus(n);
    const varzia = varziaStatus(n);
    html += '<div style="display:flex;flex-direction:column;gap:8px;">';
    specialItems.forEach(it=>{
      const isExp = !!expanded[it.id];
      html += cardOpen(false, false);
      html += '<div onclick="toggleExpand(\''+it.id+'\')" style="flex:1;cursor:pointer;min-width:0;">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
        +'<div style="font-weight:600;font-size:15px;letter-spacing:-0.01em;color:'+C.text+';">'+it.t+'</div>'
        +'<span style="margin-left:auto;color:'+C.muted+';font-size:11px;transition:transform .2s ease;transform:'+(isExp?"rotate(180deg)":"none")+';">▼</span></div>'
        +'<div style="font-size:13px;color:#a4aab6;margin-top:4px;line-height:1.5;">'+it.d+'</div>'
        +(isExp?infoRowsHTML(it.i):"");
      if(isExp && it.vendor==="ergo"){
        html += vendorBarHTML(fmtDur(cycleMs(n,4*86400000,ERGO_EPOCH))+" until next rotation", cyclePct(n,4*86400000,ERGO_EPOCH));
      }
      if(isExp && it.vendor==="eleanor"){
        html += vendorBarHTML(fmtDur(cycleMs(n,4*86400000,ELEANOR_EPOCH))+" until next rotation", cyclePct(n,4*86400000,ELEANOR_EPOCH));
        const b = eleanorBatch(n);
        html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:'+C.muted+';letter-spacing:0.06em;text-transform:uppercase;margin-top:6px;">Currently selling Batch '+b+' · Batch '+(b==="A"?"B":"A")+' next</div>';
      }
      if(isExp && it.vendor==="baro"){
        const label = baro.active ? ("Active now, departs in "+fmtDur(baro.msLeft)) : ("Arrives in "+fmtDur(baro.msLeft));
        const pctv = baro.active ? (100-(baro.msLeft/(48*3600000)*100)) : (100-(baro.msLeft/(14*86400000)*100));
        html += vendorBarHTML(label, pctv, baro.active);
      }
      if(isExp && it.vendor==="varzia"){
        html += vendorBarHTML(fmtDur(varzia.msLeft)+" until rotation changes", 100-(varzia.msLeft/(28*86400000)*100));
      }
      if(isExp) html += lootRowHTML(it.r);
      html += '</div></div>';
    });
    html += '</div>';
    html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;margin-top:24px;margin-bottom:4px;display:flex;align-items:center;gap:10px;color:'+C.muted+';">'
      +'<span>Watch for, no fixed timer</span><span style="flex:1;height:1px;background:'+C.line+';"></span></div>'
      +'<div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;">'
      +watchItems.map(w=>'<div style="font-size:13px;color:#a4aab6;padding:10px 14px;line-height:1.5;background:'+C.panel+';border:1px solid '+C.line+';border-radius:6px;">'+w+'</div>').join("")
      +'</div>';
  }
  return html;
}

/* ============================================================
   RETURN PATH TAB
   ============================================================ */
function renderPathTab(){
  const chips = [["all","Full Path"]].concat(pathPhases.map(p=>[p.key,p.label]));
  let html = '<div style="display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 12px;position:sticky;top:0;z-index:10;background:linear-gradient(to bottom, '+C.bg+' 78%, transparent);">'
    +chips.map(([k,l])=>chipHTML(k,l,pathFilter===k,C.sky,"#0c1622","setPathFilter")).join("")
    +'</div>';
  html += '<div style="font-size:12.5px;color:#a8c8e8;line-height:1.55;border:1px solid '+C.sky+'4d;border-radius:6px;background:'+C.sky+'0f;padding:11px 14px;margin-bottom:12px;">'
    +'<b style="color:'+C.sky+';">The spine rule:</b> main quests gate systems, systems gate loot. Whenever you do not know what to do, push the next quest. Mastery Rank requirements were removed from all main story quests, so nothing but prerequisites blocks you.</div>';

  pathPhases.forEach(phase=>{
    if(pathFilter!=="all" && pathFilter!==phase.key) return;
    html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;margin-top:20px;margin-bottom:4px;display:flex;align-items:center;gap:10px;color:'+C.sky+';">'
      +'<span>'+phase.title+'</span><span style="flex:1;height:1px;background:'+C.line+';"></span></div>'
      +'<p style="font-size:12.5px;color:'+C.muted+';margin-bottom:12px;line-height:1.5;">'+phase.sub+'</p>'
      +'<div style="display:flex;flex-direction:column;gap:8px;">';
    phase.steps.forEach((st, idx)=>{
      const done = !!pathState.done[st.id];
      const isExp = !!expanded[st.id];
      html += cardOpen(done, false);
      html += checkboxHTML(done, C.sky, "event.stopPropagation();togglePath('"+st.id+"')");
      html += rankHTML(idx+1, true);
      html += '<div onclick="toggleExpand(\''+st.id+'\')" style="flex:1;cursor:pointer;min-width:0;">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
        +'<div style="font-weight:600;font-size:15px;letter-spacing:-0.01em;color:'+(done?C.muted:C.text)+';text-decoration:'+(done?"line-through":"none")+';">'+st.t+'</div>'
        +'<span style="margin-left:auto;color:'+C.muted+';font-size:11px;transition:transform .2s ease;transform:'+(isExp?"rotate(180deg)":"none")+';">▼</span></div>'
        +'<div style="font-size:13px;color:#a4aab6;margin-top:4px;line-height:1.5;">'+st.d+'</div>'
        +(isExp?infoRowsHTML(st.i, true):"")
        +'</div></div>';
    });
    html += '</div>';
  });
  return html;
}

/* ============================================================
   FARMS TAB
   ============================================================ */
function renderFarmsTab(){
  const chips = [["all","All Loot"]].concat(lootCategories.map(c=>[c.key,c.label]));
  let html = '<div style="display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 12px;position:sticky;top:0;z-index:10;background:linear-gradient(to bottom, '+C.bg+' 78%, transparent);">'
    +chips.map(([k,l])=>chipHTML(k,l,farmFilter===k,C.yellow,"#221b04","setFarmFilter")).join("")
    +'</div>';

  lootCategories.forEach(cat=>{
    if(farmFilter!=="all" && farmFilter!==cat.key) return;
    html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;margin-top:20px;margin-bottom:4px;display:flex;align-items:center;gap:10px;color:'+C.yellow+';">'
      +'<span>'+cat.title+'</span><span style="flex:1;height:1px;background:'+C.line+';"></span></div>'
      +'<p style="font-size:12.5px;color:'+C.muted+';margin-bottom:12px;line-height:1.5;">'+cat.sub+'</p>'
      +'<div style="display:flex;flex-direction:column;gap:8px;">';
    cat.ranks.forEach((entry, idx)=>{
      const f = farmDB[entry.ref];
      const key = cat.key + "-" + entry.ref;
      const isExp = !!expanded[key];
      html += cardOpen(false, false);
      html += rankHTML(idx+1, false);
      html += '<div onclick="toggleExpand(\''+key+'\')" style="flex:1;cursor:pointer;min-width:0;">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
        +'<div style="font-weight:600;font-size:15px;letter-spacing:-0.01em;color:'+C.text+';">'+f.t+'</div>'
        +(f.rt?('<span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;letter-spacing:0.08em;color:'+C.green+';border:1px solid '+C.green+'73;background:'+C.green+'14;border-radius:4px;padding:1px 6px;text-transform:uppercase;">Routine</span>'):"")
        +'<span style="margin-left:auto;color:'+C.muted+';font-size:11px;transition:transform .2s ease;transform:'+(isExp?"rotate(180deg)":"none")+';">▼</span></div>'
        +'<div style="font-size:13px;color:#a4aab6;margin-top:4px;line-height:1.5;">'+entry.note+'</div>'
        +(isExp?infoRowsHTML(f.i):"")
        +(isExp?lootRowHTML(f.r):"")
        +'</div></div>';
    });
    html += '</div>';
  });
  return html;
}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render(){
  const dailyVisible = dailyItems.filter(i=>!i.opt || showOptional);
  const dailyDone = dailyVisible.filter(i=>dailyState.done[i.id]).length;
  const weeklyVisible = weeklyItems.filter(i=>!i.opt || showOptional);
  const weeklyDone = weeklyVisible.filter(i=>weeklyState.done[i.id]).length;
  const allPathSteps = pathPhases.reduce((a,p)=>a.concat(p.steps), []);
  const pathDone = allPathSteps.filter(s=>pathState.done[s.id]).length;

  const dailyPct = dailyVisible.length ? (dailyDone/dailyVisible.length*100) : 0;
  const weeklyPct = weeklyVisible.length ? (weeklyDone/weeklyVisible.length*100) : 0;
  const pathPct = allPathSteps.length ? (pathDone/allPathSteps.length*100) : 0;

  const TABS = [
    ["routine","Routine",C.green,"#0e1a12"],
    ["path","Return Path",C.sky,"#0c1622"],
    ["farms","Farms",C.yellow,"#221b04"],
  ];

  let html = '<div style="min-height:100vh;background:'+C.bg+';color:'+C.body+';">'
    +'<div style="max-width:800px;margin:0 auto;padding:20px 14px 56px;">'
    +'<div style="background:'+C.panel+';border:1px solid '+C.line+';border-radius:8px;padding:18px 18px;margin-bottom:16px;">'
    +'<div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:0.16em;color:'+C.green+';text-transform:uppercase;">Operator Protocol // Origin System</div>'
    +'<h1 style="color:'+C.text+';font-weight:700;font-size:23px;letter-spacing:-0.01em;margin:6px 0 16px;">Tenno Protocol</h1>'
    +'<div style="display:flex;flex-direction:column;gap:9px;">'
    +overviewRowHTML("Path", C.sky, pathPct, pathDone+"/"+allPathSteps.length)
    +overviewRowHTML("Daily", C.green, dailyPct, dailyDone+"/"+dailyVisible.length)
    +overviewRowHTML("Weekly", C.yellow, weeklyPct, weeklyDone+"/"+weeklyVisible.length)
    +'</div></div>'
    +'<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">'
    +TABS.map(([key,label,color,textOn])=>{
      const active = tab===key;
      return '<div onclick="setTab(\''+key+'\')" style="flex:1;min-width:100px;text-align:center;font-weight:600;font-size:12.5px;letter-spacing:0.02em;text-transform:uppercase;padding:11px 4px;border-radius:6px;cursor:pointer;user-select:none;'
        +'border:1px solid '+(active?color:C.line)+';background:'+(active?color:C.panel)+';color:'+(active?textOn:C.muted)+';">'+label+'</div>';
    }).join("")
    +'</div>'
    +'<div id="tabContent">'
    +(tab==="routine" ? renderRoutineTab() : tab==="path" ? renderPathTab() : renderFarmsTab())
    +'</div>'
    +'<footer style="text-align:center;margin-top:26px;font-family:\'JetBrains Mono\',monospace;font-size:9.5px;color:#454b56;letter-spacing:0.08em;">TAP A CARD FOR DETAILS · TAP DOTTED TERMS FOR DEFINITIONS · PROGRESS SAVES ON THIS DEVICE</footer>'
    +'</div></div>';

  if(glossKey && GLOSSARY[glossKey]){
    html += '<div onclick="closeGloss()" style="position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.65);">'
      +'<div onclick="event.stopPropagation()" style="position:fixed;left:0;right:0;bottom:0;max-width:800px;margin:0 auto;background:'+C.panel+';border:1px solid '+C.line+';border-bottom:none;border-radius:12px 12px 0 0;padding:16px 18px 26px;">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'
      +'<span style="font-weight:700;font-size:16px;color:'+C.yellow+';">'+GLOSSARY[glossKey].t+'</span>'
      +'<span onclick="closeGloss()" style="color:'+C.muted+';cursor:pointer;font-size:15px;padding:4px 8px;">✕</span></div>'
      +'<p style="font-size:13px;line-height:1.6;color:'+C.body+';margin:0;">'+GLOSSARY[glossKey].d+'</p></div></div>';
  }

  document.getElementById("app").innerHTML = html;
}

/* live reset + vendor timer ticking */
setInterval(function(){
  const n = new Date();
  const dKey = dailyBoundaryKey(n);
  if(dailyState.resetKey !== dKey){ dailyState = {resetKey:dKey, done:{}}; saveJSON("wf-daily-state", dailyState); }
  const wKey = mondayOf(n);
  if(weeklyState.resetKey !== wKey){ weeklyState = {resetKey:wKey, done:{}}; saveJSON("wf-weekly-state", weeklyState); }
  render();
}, 1000);

render();

</script>
</body>
</html>
